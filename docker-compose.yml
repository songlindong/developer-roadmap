services:
  mysql:
    image: mysql:8.0
    container_name: study_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: study_platform
      MYSQL_USER: study
      MYSQL_PASSWORD: study123
    ports:
      - "3309:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      args:
        GOPROXY: https://goproxy.cn,direct
      dockerfile: Dockerfile
    container_name: study_backend
    restart: unless-stopped
    environment:
      APP_ENV: production
      SERVER_PORT: 8080
      MYSQL_DSN: study:study123@tcp(mysql:3306)/study_platform?charset=utf8mb4&parseTime=True&loc=Local
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - "8080"

  nginx:
    build:
      context: .
      dockerfile: deploy/nginx/Dockerfile
    container_name: study_nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql_data: